name: Build Executable with PyInstaller

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types: [created]  # タグが作成されたときにトリガー

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10']  # 必要に応じて他のバージョンも追加可能

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt  # requirements.txt からライブラリをインストール

      - name: Build Executable with PyInstaller
        run: |
          pyinstaller --onefile src/main.py --name main --collect-data TkEasyGUI -y
        shell: bash  # Windowsでもbashを利用

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: executable-${{ matrix.os }}
          path: dist/your_script${{ matrix.os == 'windows-latest' && '.exe' || '' }}

          - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: "Release ${{ github.ref_name }}"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # GitHubのアクセストークンを使用してリリースを作成

      - name: Upload Release Asset (macOS/Linux)
        if: matrix.os != 'windows-latest'  # Windows以外
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/main  # 実行ファイルのパスを指定
          asset_name: main-${{ matrix.os }}
          asset_content_type: application/octet-stream

      - name: Upload Release Asset (Windows)
        if: matrix.os == 'windows-latest'  # Windowsのみ
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/main.exe  # Windows向けに拡張子を付ける
          asset_name: main.exe
          asset_content_type: application/octet-stream