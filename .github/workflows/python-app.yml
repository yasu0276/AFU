name: Build Executable with PyInstaller

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.9']  # 必要に応じて他のバージョンも追加可能

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller　TkEasyGUI　simpleaudio

      - name: Build Executable with PyInstaller
        run: |
          pyinstaller --onefile src/main.py --collect-data TkEasyGUI -y
        shell: bash  # Windowsでもbashを利用

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: executable-${{ matrix.os }}
          path: dist/your_script${{ matrix.os == 'windows-latest' && '.exe' || '' }}
